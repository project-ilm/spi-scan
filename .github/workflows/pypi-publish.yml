name: Publish to PyPI
# Tag a release (e.g. v1.0.2) and this builds + publishes to PyPI automatically.
# Uses PyPI Trusted Publishing (OIDC) — NO API token stored anywhere.
# One-time setup: on PyPI -> project -> Publishing -> add a GitHub trusted publisher
#   owner=project-ilm  repo=<this repo>  workflow=pypi-publish.yml  environment=pypi
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with: {name: dist, path: dist/}
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@release/v1
